# =============================================================================
# CV Manager — Docs (MkDocs Material + i18n)
# =============================================================================
# Docs:  https://squidfunk.github.io/mkdocs-material/
# i18n:  https://github.com/ultrabug/mkdocs-static-i18n
# =============================================================================
#
# Cloudflare Pages build settings:
#   Build command: pip install -r requirements-docs.txt && mkdocs build
#   Build output directory: site
#   Root directory: /  (project root)
# =============================================================================

site_name: CV Manager — Docs
site_description: Documentation for CV Manager – a self-hosted CV/resume management system
site_url: https://docs.example.com  # TODO: Replace with your Cloudflare Pages URL

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  language: en
  features:
    - navigation.tabs              # Top-level sections as tabs
    - navigation.sections          # Collapsible sidebar sections
    - navigation.top               # Back-to-top button
    - navigation.indexes           # Section index pages (index.md)
    - navigation.expand            # Auto-expand sidebar sections
    - search.suggest               # Search autocomplete
    - search.highlight             # Highlight search terms on page
    - content.code.copy            # Copy button on code blocks
    - toc.integrate                # TOC in left sidebar
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: material/file-account

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
