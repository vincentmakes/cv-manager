# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition                     # Note / Warning / Tip callout boxes
  - pymdownx.details               # Collapsible admonitions (??? note)
  - pymdownx.superfences            # Fenced code blocks, diagrams
  - pymdownx.tabbed:                # Content tabs
      alternate_style: true
  - pymdownx.emoji:                  # :material-*: icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list                       # HTML attributes on elements
  - md_in_html                      # Markdown inside HTML blocks
  - tables                          # Pipe tables
  - toc:
      permalink: true               # Anchor links on headings

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - First Steps: getting-started/first-steps.md
  - User Guide:
      - guide/index.md
      - Sections: guide/sections.md
      - Editing Content: guide/editing.md
      - Custom Sections: guide/custom-sections.md
      - Timeline: guide/timeline.md
      - Theme & Appearance: guide/theme.md
      - Language: guide/language.md
      - Datasets: guide/datasets.md
      - Print & PDF: guide/print-pdf.md
      - Import & Export: guide/import-export.md
      - Static Site Export: guide/static-site.md
  - Advanced:
      - advanced/index.md
      - Settings: advanced/settings.md
      - Security & Privacy: advanced/security.md
      - ATS Compatibility: advanced/ats.md
  - Reference:
      - reference/index.md
      - FAQ: reference/faq.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - Support: reference/support.md

# ---------------------------------------------------------------------------
# Extra
# ---------------------------------------------------------------------------
extra:
  # Google Analytics
  analytics:
    provider: google
    property: G-SZM87KYZQJ
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences,
      as well as to measure the effectiveness of our documentation.
      With your consent, you're helping us to make our documentation better.

  # Language selector in the header
  alternate:
    - name: English
      link: /
      lang: en
    - name: Deutsch
      link: /de/
      lang: de
    - name: Français
      link: /fr/
      lang: fr
    - name: Nederlands
      link: /nl/
      lang: nl
    - name: Español
      link: /es/
      lang: es
    - name: Italiano
      link: /it/
      lang: it
    - name: Português
      link: /pt/
      lang: pt
    - name: 中文
