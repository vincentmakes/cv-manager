name: Desktop App Build

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: macos-arm64
            rust-target: aarch64-apple-darwin
          - runner: macos-13
            target: macos-x64
            rust-target: x86_64-apple-darwin
          - runner: ubuntu-22.04
            target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: win-x64
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      # Install system dependencies for Linux (WebKitGTK, etc.)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Setup Node.js for building the sidecar
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install main app dependencies (needed by pkg to bundle them)
      - name: Install app dependencies
        run: npm ci

      # Install desktop build tools
      - name: Install desktop build tools
        working-directory: desktop
        run: npm ci

      # Build the sidecar binary for this platform
      - name: Build sidecar
        run: node desktop/build-sidecar.js --target ${{ matrix.target }}

      # Setup Rust toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Build with Tauri and create release
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CV Manager Desktop ${{ github.ref_name }}'
          releaseBody: 'Desktop application release. See the main CHANGELOG.md for app changes.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust-target }}
